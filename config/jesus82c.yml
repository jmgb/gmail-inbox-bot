name: jesus82c
email: jesus82c@gmail.com
refresh_token_env: GOOGLE_REFRESH_TOKEN_JESUS82C
# send_as: alias@midominio.com  # descomentar si hay alias configurado
query: is:unread in:inbox

classifier:
  prompt_file: gmail_inbox_bot/prompts/clasificador_inbox.txt
  # model: gpt-5.2-2025-12-11  # descomentar para override del modelo

max_emails_per_poll: 50
poll_interval_seconds: 600

# Google Sheets — log de trades IB
sheets_id: 1dOzjMMvbk-6zcaj3aV62frIsygSQpsV0jkdsVGJIpaM

# --- Pre-filtros: antes de clasificar, por remitente/asunto ---
pre_filters:
  - name: IB Trading Assistant
    match:
      sender_contains: tradingassistant@interactivebrokers.com
    action: ib_trade
    folder: Trading
    sheets_tab: Resumen

  - name: Interactive Brokers (silenciar)
    match:
      sender_contains: interactivebrokers.com
    action: silent

  - name: IB Prospectus Docs (silenciar)
    match:
      sender_contains: prospectusdocs.com
    action: silent

  - name: Banco Santander (silenciar)
    match:
      sender_contains: santander
    action: silent

  - name: Nubank (silenciar)
    match:
      sender_contains: nubank.com.br
    action: silent

# --- Routing: qué hacer con cada categoría ---
routing:
  personal:
    action: tag
    tag: REVISAR IA
    is_read: false     # mantener sin leer en el inbox para que el usuario lo note

  finanzas:
    action: tag
    tag: REVISAR IA
    is_read: false

  compras:
    action: move
    folder: Compras

  newsletters:
    action: move
    folder: Newsletters
    is_read: false

  notificaciones:
    action: move
    folder: Notificaciones

  automatico:
    action: silent
    folder: Automatico   # post-action: archivar con label

  spam:
    action: delete       # mover a papelera

  otros:
    action: tag
    tag: REVISAR IA
    is_read: false       # fallback seguro: siempre a revisión manual en el inbox
