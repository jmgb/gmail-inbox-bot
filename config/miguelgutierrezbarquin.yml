name: miguelgutierrezbarquin
email: miguelgutierrezbarquin@gmail.com
refresh_token_env: GOOGLE_REFRESH_TOKEN_MIGUELGUTIERREZBARQUIN
# send_as: alias@midominio.com  # descomentar si hay alias configurado
query: is:unread in:inbox

# --- Recordatorios diarios de Google Calendar ---
# IMPORTANTE: poner enabled: true SOLO tras re-autorizar el refresh token con el
# scope calendar.readonly (uv run python scripts/get_refresh_token.py). Con el
# token actual (gmail.modify) las llamadas a Calendar fallan por scope insuficiente.
calendar_reminders:
  enabled: true
  # 09:16 (no 09:00) a propósito: una hora "rota" parece que la persona se sentó
  # a escribir el recordatorio a mano en un momento cualquiera de la mañana, no que
  # un sistema lo dispara en punto. Objetivo: que el destinatario perciba un mensaje
  # personal escrito por Miguel, no una automatización.
  send_time: "09:16"
  timezone: Europe/Madrid
  max_attendees: 2          # invitados además del titular (reuniones 1:1 y trío)
  sender_name: Miguel       # nombre con el que se firma el recordatorio

classifier:
  prompt_file: gmail_inbox_bot/prompts/clasificador_inbox.txt
  # model: gpt-5.2-2025-12-11  # descomentar para override del modelo

max_emails_per_poll: 50
poll_interval_seconds: 600

# --- Pre-filtros: antes de clasificar, por remitente/asunto ---
pre_filters:
  - name: Banreservas (irrelevante)
    match:
      sender_contains: banreservas.com
    action: silent

  - name: Interactive Brokers (silenciar)
    match:
      sender_contains: interactivebrokers.com
    action: silent

  - name: IB Prospectus Docs (silenciar)
    match:
      sender_contains: prospectusdocs.com
    action: silent

  - name: Banco Santander (silenciar)
    match:
      sender_contains: santander
    action: silent

  - name: Nubank (silenciar)
    match:
      sender_contains: nubank.com.br
    action: silent

# --- Routing: qué hacer con cada categoría ---
routing:
  personal:
    action: tag
    tag: REVISAR IA
    is_read: false

  finanzas:
    action: tag
    tag: REVISAR IA
    is_read: false

  compras:
    action: move
    folder: Compras

  newsletters:
    action: move
    folder: Newsletters
    is_read: false

  notificaciones:
    action: move
    folder: Notificaciones

  automatico:
    action: silent
    folder: Automatico

  spam:
    action: delete

  otros:
    action: tag
    tag: REVISAR IA
    is_read: false
