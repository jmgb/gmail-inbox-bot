name: miguelgutierrezbarquin
email: miguelgutierrezbarquin@gmail.com
refresh_token_env: GOOGLE_REFRESH_TOKEN_MIGUELGUTIERREZBARQUIN
# send_as: alias@midominio.com  # descomentar si hay alias configurado
query: is:unread in:inbox

classifier:
  prompt_file: gmail_inbox_bot/prompts/clasificador_inbox.txt
  # model: gpt-5.2-2025-12-11  # descomentar para override del modelo

max_emails_per_poll: 50
poll_interval_seconds: 600

# --- Pre-filtros: antes de clasificar, por remitente/asunto ---
pre_filters:
  - name: Banreservas (irrelevante)
    match:
      sender_contains: banreservas.com
    action: silent

# --- Routing: qué hacer con cada categoría ---
routing:
  personal:
    action: tag
    tag: REVISAR IA
    is_read: false

  finanzas:
    action: tag
    tag: REVISAR IA
    is_read: false

  compras:
    action: move
    folder: Compras

  newsletters:
    action: move
    folder: Newsletters
    is_read: false

  notificaciones:
    action: move
    folder: Notificaciones

  automatico:
    action: silent
    folder: Automatico

  spam:
    action: delete

  otros:
    action: tag
    tag: REVISAR IA
    is_read: false
