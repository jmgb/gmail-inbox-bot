services:
  gmail-inbox-bot:
    build: .
    container_name: gmail-inbox-bot
    env_file: [.env]
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    networks: [pymechat-net]
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  pymechat-net:
    external: true
