name: Deploy Gmail Inbox Bot
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gmail-vps
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

  build-image:
    name: Build immutable image (GHCR)
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.digest.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve image coordinates
        id: meta
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/gmail-inbox-bot"
          IMAGE_TAG="${IMAGE}:sha-${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:main
            ${{ steps.meta.outputs.image_tag }}

      - id: digest
        run: |
          echo "image_ref=${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      # GHCR no borra nada nunca: llegó a 60 versiones antes de la primera purga
      # (2026-07-17). Cada build sube 3 versiones (la imagen + los artefactos de
      # buildx), así que 12 ≈ 4 builds de margen para rollback. Corre DESPUÉS del
      # push, por lo que la imagen recién construida es la más reciente y nunca se
      # toca; `main` apunta a ella y es lo que el VPS pulea por digest. Este repo
      # despliega en CADA push a main (sin gate VPS_AUTO_DEPLOY_ENABLED), así que
      # sin esto el registro crece sin techo.
      # Poda manual equivalente: presupuestor/scripts/purge-ghcr-versions.sh
      - name: Purga versiones antiguas en GHCR
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: gmail-inbox-bot
          package-type: container
          min-versions-to-keep: 12

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /home/ubuntu/services/gmail-inbox-bot
            git pull origin main --ff-only

            DEPLOY_IMAGE_REF='${{ needs.build-image.outputs.image_ref }}' \
            DEPLOY_ALLOW_FALLBACK='true' \
            GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' \
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
            ./scripts/vps_deploy.sh
