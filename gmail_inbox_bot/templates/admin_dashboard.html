<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Gmail Bot - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #050505;
        --bg-gradient: radial-gradient(circle at 50% 0%, #171824 0%, #050505 100%);
        --surface: rgba(30, 30, 35, 0.6);
        --surface-border: rgba(255, 255, 255, 0.08);
        --surface-hover: rgba(45, 45, 55, 0.7);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --accent-primary: #14b8a6;
        --accent-glow: rgba(20, 184, 166, 0.3);
        --accent-secondary: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        background-image: var(--bg-gradient);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        opacity: 0.5;
        animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
      }
      .blob-1 {
        top: -10%; left: -10%; width: 500px; height: 500px;
        background: rgba(20, 184, 166, 0.15);
      }
      .blob-2 {
        bottom: -20%; right: -10%; width: 600px; height: 600px;
        background: rgba(99, 102, 241, 0.1);
        animation-delay: -5s;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, 50px) scale(1.1); }
        100% { transform: translate(-20px, 20px) scale(0.9); }
      }

      a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s ease, text-shadow 0.2s ease;
      }

      a:hover {
        color: var(--accent-primary);
        text-shadow: 0 0 8px var(--accent-glow);
      }

      .header {
        background: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 20px 40px;
        border-bottom: 1px solid var(--surface-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header h1 {
        font-size: 20px;
        font-weight: 600;
        background: linear-gradient(to right, #fff, #9ca3af);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .logo-icon {
        width: 24px;
        height: 24px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        border-radius: 6px;
        box-shadow: 0 0 15px var(--accent-glow);
      }

      .header-links {
        font-size: 14px;
        display: flex;
        gap: 24px;
        font-weight: 500;
      }

      .header-links a {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .filters {
        padding: 24px 40px;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        background: linear-gradient(to bottom, rgba(5,5,5,0.4), transparent);
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        padding: 6px 6px 6px 12px;
        border-radius: 12px;
        border: 1px solid var(--surface-border);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(8px);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .filter-group:focus-within {
        border-color: rgba(20, 184, 166, 0.5);
        box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.1);
      }

      .filters label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .filters input[type="date"],
      .filters select {
        background: transparent;
        color: var(--text-primary);
        border: none;
        padding: 6px 8px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .filters input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1) opacity(0.6);
        cursor: pointer;
      }

      .filters select option {
        background: #1e1e24;
        color: #fff;
      }

      .filters input[type="date"]:hover,
      .filters select:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .btn {
        background: linear-gradient(135deg, var(--accent-primary), #0d9488);
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px var(--accent-glow);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(20, 184, 166, 0.5);
        filter: brightness(1.1);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .content {
        padding: 20px 40px 60px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        padding: 24px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(20, 184, 166, 0.2);
      }

      .card:hover::before {
        opacity: 1;
      }

      .card-label {
        font-size: 13px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-icon {
        background: rgba(255, 255, 255, 0.05);
        padding: 6px;
        border-radius: 8px;
        display: inline-flex;
      }

      .card-value {
        font-size: 36px;
        font-weight: 700;
        color: #fff;
        line-height: 1.1;
      }

      .card-value.total {
        background: linear-gradient(135deg, #10b981, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        margin-top: 20px;
      }

      .section-title {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title::before {
        content: '';
        display: block;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--accent-secondary);
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
      }

      .chart-container {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        padding: 30px;
        margin-bottom: 40px;
        overflow-x: auto;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      }

      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        height: 220px;
        min-width: fit-content;
        padding-top: 20px;
      }

      .bar-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 0 0 auto;
        min-width: 32px;
      }

      .bar {
        width: 24px;
        background: linear-gradient(to top, rgba(20, 184, 166, 0.2), var(--accent-primary));
        border-radius: 4px 4px 0 0;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        box-shadow: 0 0 10px rgba(20, 184, 166, 0.1) inset;
      }

      .bar::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 4px;
        background: rgba(255,255,255,0.4);
        border-radius: 4px 4px 0 0;
      }

      .bar-col:hover .bar {
        background: linear-gradient(to top, rgba(20, 184, 166, 0.4), #34d399);
        box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        transform: scaleY(1.02);
      }

      .bar-tooltip {
        opacity: 0;
        visibility: hidden;
        position: absolute;
        bottom: calc(100% + 15px);
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: #1f2937;
        color: #f3f4f6;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        z-index: 10;
        transition: all 0.2s ease;
        pointer-events: none;
      }

      .bar-tooltip::after {
        content: '';
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border-width: 5px;
        border-style: solid;
        border-color: #1f2937 transparent transparent transparent;
      }

      .bar-col:hover .bar-tooltip {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      .bar-count {
        font-size: 11px;
        color: var(--text-primary);
        margin-bottom: 8px;
        font-weight: 600;
        opacity: 0.8;
      }

      .bar-date {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 12px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      .tables-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 24px;
        margin-bottom: 40px;
      }

      .table-card {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: 16px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        display: flex;
        flex-direction: column;
      }

      .table-card-header {
        padding: 18px 20px;
        background: rgba(0,0,0,0.2);
        border-bottom: 1px solid var(--surface-border);
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .table-card-header::before {
        content: '';
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-primary);
        box-shadow: 0 0 8px var(--accent-glow);
      }

      .cat-table-wrap {
        overflow-x: auto;
        flex: 1;
      }

      .cat-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .cat-table th {
        text-align: left;
        padding: 12px 20px;
        color: var(--text-secondary);
        font-weight: 500;
        border-bottom: 1px solid var(--surface-border);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .cat-table td {
        padding: 12px 20px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
        color: #d1d5db;
        vertical-align: middle;
      }

      .cat-table tr:last-child td {
        border-bottom: none;
      }

      .cat-table tr:hover td {
        background: rgba(255,255,255,0.03);
        color: #fff;
      }

      .cat-name-cell {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .count-cell {
        text-align: right;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        color: var(--accent-primary) !important;
      }

      .progress-bar-bg {
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
        width: 100%;
      }

      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
        border-radius: 2px;
      }

      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
        color: var(--text-secondary);
        font-size: 15px;
        gap: 16px;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(20, 184, 166, 0.2);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
        font-size: 15px;
        background: rgba(255,255,255,0.02);
        border-radius: 12px;
        border: 1px dashed var(--surface-border);
      }

      .error-msg {
        text-align: center;
        padding: 24px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 12px;
        color: #f87171;
        font-size: 15px;
        margin: 20px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .footer {
        background: rgba(5,5,5,0.8);
        padding: 24px;
        border-top: 1px solid var(--surface-border);
        font-size: 13px;
        color: var(--text-secondary);
        text-align: center;
        backdrop-filter: blur(10px);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #050505;
      }

      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #4b5563;
      }

      @media (max-width: 768px) {
        .header,
        .filters,
        .content {
          padding-left: 20px;
          padding-right: 20px;
        }

        .cards {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="header">
      <div class="header-logo">
        <div class="logo-icon"></div>
        <h1>Gmail Bot Dashboard</h1>
      </div>
      <div class="header-links">
        <a href="/admin/logs">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          Log Viewer
        </a>
        <a href="/health">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
          Health
        </a>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label for="dateFrom">Desde</label>
        <input type="date" id="dateFrom" />
      </div>
      <div class="filter-group">
        <label for="dateTo">Hasta</label>
        <input type="date" id="dateTo" />
      </div>
      <div class="filter-group">
        <label for="mailboxFilter">Cuenta</label>
        <select id="mailboxFilter">
          <option value="">Todas las cuentas</option>
          <option value="jesus82c">jesus82c</option>
          <option value="miguelgutierrezbarquin">miguelgutierrezbarquin</option>
        </select>
      </div>
      <button class="btn" id="filterBtn" onclick="applyFilters()">
        <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
        Filtrar Resultados
      </button>
    </div>

    <div class="content" id="mainContent">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <div>Cargando analíticas...</div>
      </div>

      <div id="dashboardContent" style="display: none">
        <div class="cards" id="cardsContainer"></div>

        <div class="section-header">
          <div class="section-title">Volumen de Emails Diario</div>
        </div>
        <div class="chart-container">
          <div class="bar-chart" id="barChart"></div>
          <div class="empty-state" id="chartEmpty" style="display: none">
            Sin actividad registrada en este periodo
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">Distribución por Categorías</div>
        </div>
        <div class="tables-grid" id="tablesContainer"></div>
      </div>

      <div class="error-msg" id="errorState" style="display: none"></div>
    </div>

    <div class="footer">
      Gmail Inbox Bot &mdash; Panel de Inteligencia
    </div>

    <script>
      const MAILBOX_LABELS = {
        jesus82c: "jesus82c@gmail.com",
        miguelgutierrezbarquin: "miguelgutierrezbarquin@gmail.com",
      };

      const MAILBOX_ICONS = {
        jesus82c: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>',
        miguelgutierrezbarquin: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>',
      };

      function fmtNum(n) {
        return n.toLocaleString("es-ES");
      }

      function mailboxLabel(key) {
        return MAILBOX_LABELS[key] || key;
      }

      function mailboxIcon(key) {
        return MAILBOX_ICONS[key] || '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>';
      }

      async function fetchMetrics() {
        const dateFrom = document.getElementById("dateFrom").value;
        const dateTo = document.getElementById("dateTo").value;
        const mailbox = document.getElementById("mailboxFilter").value;

        const params = new URLSearchParams();
        if (dateFrom) params.set("date_from", dateFrom);
        if (dateTo) params.set("date_to", dateTo);
        if (mailbox) params.set("mailbox", mailbox);

        document.getElementById("loadingState").style.display = "flex";
        document.getElementById("dashboardContent").style.display = "none";
        document.getElementById("errorState").style.display = "none";
        document.getElementById("filterBtn").disabled = true;

        try {
          const res = await fetch(`/admin/api/metrics?${params.toString()}`, {
            cache: "no-store",
          });
          if (res.status === 401) {
            window.location.href = "/admin/logs";
            return;
          }
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          renderDashboard(data);
        } catch (err) {
          document.getElementById("loadingState").style.display = "none";
          document.getElementById("errorState").style.display = "flex";
          document.getElementById("errorState").innerHTML =
            `<svg style="width:24px;height:24px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
             <div>Error cargando métricas: ${err.message}</div>`;
        } finally {
          document.getElementById("filterBtn").disabled = false;
        }
      }

      function renderDashboard(data) {
        document.getElementById("loadingState").style.display = "none";
        document.getElementById("dashboardContent").style.display = "block";

        renderCards(data);
        renderChart(data.by_date);
        renderTables(data.by_category, data.filters.mailbox);
      }

      function renderCards(data) {
        const container = document.getElementById("cardsContainer");
        let html = `
          <div class="card">
            <div class="card-label">
              <span class="card-icon">
                <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
              </span>
              Total Emails
            </div>
            <div class="card-value total">${fmtNum(data.total)}</div>
          </div>`;

        const currentMailbox = document.getElementById("mailboxFilter").value;
        const mailboxes = currentMailbox ? [currentMailbox] : ["jesus82c", "miguelgutierrezbarquin"];

        const mbMap = {};
        (data.by_mailbox || []).forEach((item) => {
          mbMap[item.mailbox] = item.count;
        });

        mailboxes.forEach((mb) => {
          const count = mbMap[mb] || 0;
          html += `
            <div class="card">
              <div class="card-label">
                <span class="card-icon" style="width:16px;height:16px;display:flex">
                  ${mailboxIcon(mb)}
                </span>
                ${mailboxLabel(mb)}
              </div>
              <div class="card-value">${fmtNum(count)}</div>
            </div>`;
        });

        container.innerHTML = html;
      }

      function renderChart(byDate) {
        const chart = document.getElementById("barChart");
        const emptyMsg = document.getElementById("chartEmpty");

        if (!byDate || byDate.length === 0) {
          chart.innerHTML = "";
          chart.style.display = "none";
          emptyMsg.style.display = "block";
          return;
        }

        chart.style.display = "flex";
        emptyMsg.style.display = "none";

        const maxCount = Math.max(...byDate.map((d) => d.count));
        const maxBarHeight = 180;

        let html = "";
        byDate.forEach((item) => {
          const height = maxCount > 0
            ? Math.max(8, (item.count / maxCount) * maxBarHeight)
            : 8;

          let dateStr = item.date;
          try {
            const d = new Date(item.date);
            dateStr = d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
          } catch(e) {}

          html += `
            <div class="bar-col">
              <div class="bar-count">${item.count}</div>
              <div class="bar" style="height: ${height}px">
                <div class="bar-tooltip"><strong>${dateStr}</strong><br/>${fmtNum(item.count)} emails</div>
              </div>
              <div class="bar-date">${dateStr}</div>
            </div>`;
        });

        chart.innerHTML = html;
      }

      function renderTables(byCategory, mailboxFilter) {
        const container = document.getElementById("tablesContainer");

        if (!byCategory || byCategory.length === 0) {
          container.innerHTML =
            '<div class="empty-state">No hay clasificaciones en este periodo</div>';
          return;
        }

        const grouped = {};
        byCategory.forEach((item) => {
          if (!grouped[item.mailbox]) grouped[item.mailbox] = [];
          grouped[item.mailbox].push(item);
        });

        const order = ["jesus82c", "miguelgutierrezbarquin"];
        const sortedKeys = Object.keys(grouped).sort((a, b) => {
          const ia = order.indexOf(a);
          const ib = order.indexOf(b);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        });

        let html = "";
        sortedKeys.forEach((mb) => {
          const items = grouped[mb];
          const maxCatCount = Math.max(...items.map(i => i.count));

          let rows = "";
          items.forEach((item) => {
            const pct = maxCatCount > 0 ? (item.count / maxCatCount) * 100 : 0;
            rows += `
              <tr>
                <td>
                  <div class="cat-name-cell">
                    <div>${item.category}</div>
                    <div class="progress-bar-bg">
                      <div class="progress-bar-fill" style="width: ${pct}%"></div>
                    </div>
                  </div>
                </td>
                <td class="count-cell">${fmtNum(item.count)}</td>
            </tr>`;
          });

          html += `
            <div class="table-card">
              <div class="table-card-header">
                ${mailboxLabel(mb)}
              </div>
              <div class="cat-table-wrap">
                <table class="cat-table">
                  <thead>
                    <tr>
                      <th>Categoría</th>
                      <th style="text-align:right">Volumen</th>
                    </tr>
                  </thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </div>`;
        });

        container.innerHTML = html;
      }

      function applyFilters() {
        fetchMetrics();
      }

      (function initDefaults() {
        const today = new Date();
        const thirtyDaysAgo = new Date(today);
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

        document.getElementById("dateTo").value = today
          .toISOString()
          .substring(0, 10);
        document.getElementById("dateFrom").value = thirtyDaysAgo
          .toISOString()
          .substring(0, 10);
      })();

      fetchMetrics();
    </script>
  </body>
</html>
